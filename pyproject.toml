classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Topic :: Scientific/Engineering",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Operating System :: OS Independent",
]

# Dependencies mirrored from fusionlab-learn init list (plus PyYAML fix).
dependencies = [
  "numpy>=1.22",
  "pandas>=1.0",
  "scipy>=1.5",
  "matplotlib>=3.3",
  "tqdm",
  "scikit-learn>=0.24",
  "joblib",
  "tensorflow>=2.20",
  "keras>=3.0",
  "statsmodels",
  "PyYAML",
  "platformdirs",
  "lz4",
  "psutil",
]

[project.urls]
"Website" = "https://lkouadio.com"
"Source" = "https://github.com/earthai-tech/geoprior-v3"
"Bug Tracker" = "https://github.com/earthai-tech/geoprior-v3/issues"

[project.scripts]
geoprior = "geoprior.cli:main"
geoprior-run = "geoprior.cli:run_main"
geoprior-build = "geoprior.cli:build_main"
geoprior-plot = "geoprior.cli:plot_main"
geoprior-init = "geoprior.cli.init_config:main"

[project.optional-dependencies]
kdiagram = ["k-diagram>=1.3.0"]

docs = [
  "sphinx>=7.0,<8.0",
  "furo",
  "sphinx-copybutton",
  "myst-parser",
  "sphinx-design",
  "sphinx-gallery",
  "sphinxcontrib-jsmath",
  "sphinx-mathjax-offline",
  "sphinx-issues",
  "sphinx-prompt",
  "sphinxcontrib-bibtex",
  "numpydoc>=1.6",
]

dev = [
  "pytest>=8.0",
  "pytest-cov>=4.1",
  "pytest-xdist",
  "pytest-mock",
  "black>=24.0",
  "ruff>=0.4",
  "coverage[toml]>=7.0",
  "requests",
]

[tool.setuptools.packages.find]
include = ["geoprior*"]

[tool.setuptools.package-data]
geoprior = [
  "_glog.yml",
  "assets/**",
  "schemas/**",
  "resources/**",
]

[tool.pytest.ini_options]
addopts = "-ra --cov=geoprior --cov-report=xml"
testpaths = ["tests"]

[tool.coverage.run]
source = ["geoprior"]
branch = true
parallel = true
omit = [
  "geoprior/__init__.py",
  "geoprior/__main__.py",
  "docs/**",
  "examples/**",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "def __repr__",
]

[tool.black]
line-length = 62
target-version = ["py310", "py311", "py312", "py313"]

[tool.ruff]
line-length = 62
target-version = "py310"
fix = true
exclude = ["docs"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["F401", "E501", "E741", "E722", "E402", "B007", "B023", "B904"]

[tool.ruff.lint.isort]
known-first-party = ["geoprior"]
